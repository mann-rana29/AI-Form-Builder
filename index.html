<html><head><style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9fafb; } .form-container { background-color: #ffffff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 40px; max-width: 650px; width: 100%; margin: 40px auto; } .form-group { margin-bottom: 24px; } label { display: block; font-size: 14px; font-weight: 500; color: #111827; margin-bottom: 8px; } input, textarea, select { width: 100%; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color 0.3s, box-shadow 0.3s; } input:focus, textarea:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); } button { background-color: #3b82f6; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s ease; width: 100%; margin-top: 16px; } button:hover { background-color: #1e40af; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3); } .rating { display: flex; justify-content: center; } .rating-icon { font-size: 24px; color: #facc15; margin: 0 8px; } .rating-icon.unselected { color: #e5e7eb; } @media (max-width: 768px) { .form-container { padding: 20px; } }</style></head><body><div class='form-container'><h2>User Feedback Form</h2><div class='form-group'><label for='rating'>Your Rating:</label><div class='rating'><span class='rating-icon'>&#9733;</span><span class='rating-icon'>&#9733;</span><span class='rating-icon'>&#9733;</span><span class='rating-icon'>&#9733;</span><span class='rating-icon'>&#9733;</span></div></div><div class='form-group'><label for='what-you-like'>What did you like?</label><textarea id='what-you-like' rows='5' cols='30'></textarea></div><div class='form-group'><label for='what-you-dislike'>What did you dislike?</label><textarea id='what-you-dislike' rows='5' cols='30'></textarea></div><div class='form-group'><label for='suggestions'>Suggestions for improvement:</label><textarea id='suggestions' rows='5' cols='30'></textarea></div><div class='form-group'><button type='submit'>Submit</button></div></div></body></html>
